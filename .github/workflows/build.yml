name: build-and-push

# Builds the app image and pushes it to GitHub Container Registry (GHCR).
# Portainer then pulls ghcr.io/<owner>/<repo>:latest.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # allow pushing to GHCR with the built-in GITHUB_TOKEN

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Optional ODA File Converter: if a Release tagged `oda` exists, pull its
      # .deb into the build context (app/oda/). Token-authed, so it works for a
      # private repo and the licensed binary is never fetched via a public URL.
      # No `oda` release -> builds with LibreDWG only.
      - name: Fetch ODA File Converter (optional)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p app/oda
          if gh release view oda >/dev/null 2>&1; then
            gh release download oda --dir app/oda --pattern '*.deb' --clobber
            echo "ODA deb in build context:"; ls -la app/oda
          else
            echo "No 'oda' release found — building without ODA (LibreDWG only)."
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # auto-lowercased
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app              # Dockerfile COPY paths are relative to app/
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
