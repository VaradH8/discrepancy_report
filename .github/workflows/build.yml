name: build-and-push

# Builds the app image and pushes it to GitHub Container Registry (GHCR).
# Portainer then pulls ghcr.io/<owner>/<repo>:latest.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # allow pushing to GHCR with the built-in GITHUB_TOKEN

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # auto-lowercased
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app              # Dockerfile COPY paths are relative to app/
          file: app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Set repo variable ODA_URL (Settings → Secrets and variables → Actions
          # → Variables) to the ODA File Converter .deb URL to bundle it. Empty =
          # LibreDWG-only build (unchanged).
          build-args: |
            ODA_URL=${{ vars.ODA_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
