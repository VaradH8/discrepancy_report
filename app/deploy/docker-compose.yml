services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dwg-discrepancy:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
    expose:
      - "8000"          # internal only; Caddy is the public entrypoint
    # Large drawings can be slow to convert — give uvicorn room.
    # (timeouts are generous defaults; tune if you hit big files)

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # persisted TLS certs — DO NOT delete between deploys
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
