# Portainer stack — app only (no Caddy). Portainer / your own reverse proxy
# handles TLS and routing; this just publishes the app on port 8000.
#
# Deploy in Portainer:
#   Stacks → Add stack → Build method: Repository
#     Repository URL : <your git remote>
#     Compose path   : app/deploy/portainer-stack.yml
#   Portainer clones the repo and builds the image on the host (first build
#   compiles LibreDWG — a few minutes). No external registry required.
#
# If instead you deploy a prebuilt image, delete the `build:` block and keep
# `image: <registry>/dwg-discrepancy:latest`.
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: dwg-discrepancy:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
