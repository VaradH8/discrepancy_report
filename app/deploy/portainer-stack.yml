# Portainer stack — pulls the prebuilt image from GHCR (built by GitHub Actions).
#
# Deploy in Portainer:
#   Stacks → Add stack → Build method: Web editor (paste this) or Repository
#   Set the image below to your repo's GHCR path, then deploy.
#
# GHCR path = ghcr.io/<github-owner>/<repo>  (all lowercase). Example:
#   ghcr.io/varadhadawale/dwg-discrepancy:latest
#
# The GHCR package is PRIVATE by default. Either:
#   • make it public (repo → Packages → package → Package settings → Change visibility), or
#   • add a registry credential in Portainer (Registries → Add → Custom):
#       URL: ghcr.io   user: <github username>   password: a PAT with read:packages
#
# To roll out a new build, re-pull: Portainer → this stack → Update (Re-pull image),
# or pin a specific tag instead of :latest (Actions also tags with the commit sha).
services:
  app:
    image: ghcr.io/varadh8/discrepancy_report:latest
    restart: unless-stopped
    environment:
      PORT: "8000"
    ports:
      - "8000:8000"
